          <p style="font-style: italic; font-size: 0.95em; margin-bottom: 15px;">
            If you found this content helpful, consider supporting the journey!
          </p>
          <a href="https://www.buymeacoffee.com/thebayesianbandit" target="_blank" class="btn btn-outline-primary btn-sm" role="button" style="padding: 8px 16px; font-weight: 500;">
            <i class="bi bi-ice-cream"></i> Buy Me an Ice Cream
          </a>
        </div>
